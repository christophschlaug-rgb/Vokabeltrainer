name: vokabeltrainer
description: Englisch Vokabeltrainer mit Spaced Repetition für C1-Niveau

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Lokale Datenbank (SQLite)
  sqflite: ^2.3.2
  path: ^1.9.0

  # HTTP für Vokabel-Download
  http: ^1.2.1

  # Datumsformatierung
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

  # Kamera und Bildauswahl für Foto-Scan
  image_picker: ^1.1.2

  # OCR (Texterkennung) — offline, kein API-Key nötig
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
